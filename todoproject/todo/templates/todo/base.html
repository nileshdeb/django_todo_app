<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c63ff;
            --primary-dark: #574fd6;
            --accent: #ff6584;
            --bg: #0f0f1a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --glass: rgba(255, 255, 255, 0.08);
            --text: #e8e8f0;
            --muted: #8888aa;
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Animated background ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 10%, rgba(108, 99, 255, 0.18) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 101, 132, 0.12) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(0, 200, 255, 0.06) 0%, transparent 60%);
            z-index: -1;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }

        @keyframes bgPulse {
            0% {
                opacity: 0.7;
                transform: scale(1);
            }

            100% {
                opacity: 1;
                transform: scale(1.05);
            }
        }

        /* Floating orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            z-index: -1;
            animation: floatOrb linear infinite;
        }

        .orb-1 {
            width: 380px;
            height: 380px;
            background: #6c63ff;
            top: -100px;
            left: -100px;
            animation-duration: 18s;
        }

        .orb-2 {
            width: 300px;
            height: 300px;
            background: #ff6584;
            bottom: -80px;
            right: -80px;
            animation-duration: 22s;
            animation-delay: -8s;
        }

        .orb-3 {
            width: 220px;
            height: 220px;
            background: #00c8ff;
            top: 50%;
            left: 60%;
            animation-duration: 15s;
            animation-delay: -4s;
        }

        @keyframes floatOrb {
            0% {
                transform: translate(0, 0) scale(1);
            }

            33% {
                transform: translate(30px, -40px) scale(1.1);
            }

            66% {
                transform: translate(-20px, 30px) scale(0.95);
            }

            100% {
                transform: translate(0, 0) scale(1);
            }
        }

        /* ── Navbar ── */
        .navbar {
            background: rgba(15, 15, 26, 0.7) !important;
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
            animation: slideDown 0.5s ease forwards;
        }

        @keyframes slideDown {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .navbar-brand {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(135deg, #6c63ff, #ff6584);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        /* ── Buttons ── */
        .btn {
            border-radius: 10px;
            font-weight: 500;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0);
            transition: background 0.2s;
        }

        .btn:hover::after {
            background: rgba(255, 255, 255, 0.08);
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 8px 24px rgba(108, 99, 255, 0.35);
        }

        .btn:active {
            transform: translateY(0) scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            color: #fff;
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4d6d, #c9184a);
            border: none;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ffd60a, #e09f0a);
            color: #111;
            border: none;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-success {
            background: linear-gradient(135deg, #06d6a0, #048a68);
            border: none;
        }

        .btn-sm {
            border-radius: 8px;
            font-size: 0.8rem;
            padding: 0.3rem 0.75rem;
        }

        /* ── Container / page fade ── */
        .container {
            animation: fadeUp 0.5s ease 0.1s both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ── Cards / glass panels ── */
        .glass-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 18px;
            backdrop-filter: blur(12px);
            padding: 2rem;
            animation: fadeUp 0.5s ease 0.15s both;
        }

        /* ── Table ── */
        .table {
            color: var(--text);
            border-collapse: separate;
            border-spacing: 0 8px;
        }

        .table thead th {
            color: var(--muted);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            padding: 0.5rem 1rem;
        }

        .table tbody tr {
            background: var(--glass);
            border-radius: 12px;
            transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
            animation: rowSlideIn 0.4s ease both;
        }

        .table tbody tr:hover {
            background: rgba(108, 99, 255, 0.12);
            transform: translateX(4px);
            box-shadow: 0 4px 20px rgba(108, 99, 255, 0.2);
        }

        .table tbody td {
            border: none;
            padding: 1rem;
            vertical-align: middle;
        }

        .table tbody td:first-child {
            border-radius: 12px 0 0 12px;
        }

        .table tbody td:last-child {
            border-radius: 0 12px 12px 0;
        }

        /* stagger row animation */
        .table tbody tr:nth-child(1) {
            animation-delay: 0.05s;
        }

        .table tbody tr:nth-child(2) {
            animation-delay: 0.10s;
        }

        .table tbody tr:nth-child(3) {
            animation-delay: 0.15s;
        }

        .table tbody tr:nth-child(4) {
            animation-delay: 0.20s;
        }

        .table tbody tr:nth-child(5) {
            animation-delay: 0.25s;
        }

        .table tbody tr:nth-child(6) {
            animation-delay: 0.30s;
        }

        .table tbody tr:nth-child(7) {
            animation-delay: 0.35s;
        }

        .table tbody tr:nth-child(8) {
            animation-delay: 0.40s;
        }

        @keyframes rowSlideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* ── Forms ── */
        h1,
        h2 {
            font-weight: 700;
        }

        h1 {
            background: linear-gradient(135deg, #fff 30%, #6c63ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 1.5rem;
        }

        h2 {
            color: var(--text);
            margin-bottom: 1.5rem;
        }

        .form-label {
            color: var(--muted);
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 0.4rem;
        }

        .form-control,
        .form-select {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
            transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
        }

        .form-control:focus,
        .form-select:focus {
            background: rgba(255, 255, 255, 0.09);
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(108, 99, 255, 0.25);
            color: var(--text);
            transform: scale(1.01);
            outline: none;
        }

        .form-control::placeholder {
            color: var(--muted);
        }

        /* ── Alert ── */
        .alert-danger {
            background: rgba(255, 77, 109, 0.15);
            border: 1px solid rgba(255, 77, 109, 0.4);
            color: #ff8fa3;
            border-radius: 10px;
            animation: shake 0.4s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            20% {
                transform: translateX(-8px);
            }

            40% {
                transform: translateX(8px);
            }

            60% {
                transform: translateX(-4px);
            }

            80% {
                transform: translateX(4px);
            }
        }

        /* ── Delete confirm card ── */
        .delete-card {
            max-width: 480px;
            margin: 6rem auto;
        }

        .delete-card p {
            color: var(--muted);
            margin-bottom: 1.5rem;
        }

        /* ── Ripple on buttons (JS) ── */
        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            background: rgba(255, 255, 255, 0.25);
            animation: rippleAnim 0.55s linear;
            pointer-events: none;
        }

        @keyframes rippleAnim {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* ── Task title strikethrough for completed ── */
        .task-done {
            text-decoration: line-through;
            opacity: 0.5;
        }

        /* ── Empty state ── */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--muted);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }
    </style>
</head>

<body>

    <!-- Floating orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <nav class="navbar mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'todo:task_list' %}">✦ Todo App</a>
            <a class="btn btn-primary" href="{% url 'todo:task_create' %}">+ Add Task</a>
        </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Ripple effect on all buttons
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', function (e) {
                const ripple = document.createElement('span');
                ripple.classList.add('ripple');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                this.appendChild(ripple);
                setTimeout(() => ripple.remove(), 600);
            });
        });

        // Row delete animation
        document.querySelectorAll('form[action*="delete"]').forEach(form => {
            form.addEventListener('submit', function (e) {
                const row = this.closest('tr');
                if (row) {
                    e.preventDefault();
                    row.style.transition = 'all 0.35s ease';
                    row.style.transform = 'translateX(60px)';
                    row.style.opacity = '0';
                    setTimeout(() => form.submit(), 350);
                }
            });
        });
    </script>
</body>

</html>
